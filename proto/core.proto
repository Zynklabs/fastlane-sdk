syntax = "proto3";

package core;

import "base.proto";

service Core {
  rpc DomainSeparator (DomainSeparatorRequest) returns (DomainSeparatorResponse);
  rpc GetPdv (GetPdvRequest) returns (PdvResponse);

  rpc GenerateOrderId (GenerateOrderIdRequest) returns (OrderIdResponse);
  rpc DeriveOrderTracker (DeriveOrderTrackerRequest) returns (OrderTrackerResponse);
  rpc ReadOrderTrackerByAddress (ReadOrderTrackerByAddressRequest) returns (OrderTrackerData);
  rpc ReadOrderTrackerByIds (ReadOrderTrackerByIdsRequest) returns (OrderTrackerData);
  
  rpc CreateOrder (CreateOrderRequest) returns (TxResponse);
  rpc Replenish (ReplenishRequest) returns (TxResponse);
  rpc Transfer (TransferRequest) returns (TxResponse);
  rpc AttestOrder (AttestOrderRequest) returns (TxResponse);

  rpc DecodeEvent (base.DecodeEventRequest) returns (base.EventData);
}

message DomainSeparatorRequest {}
message DomainSeparatorResponse {
  uint64 domain_separator = 1;
}

message GetPdvRequest {
  optional string partner_id = 1;
}

message PdvResponse {
  string pdv = 1;
}

message GenerateOrderIdRequest {
  string partner_id = 1;
  string request_id = 2;
}

message OrderIdResponse {
  string order_id = 1;
}

message DeriveOrderTrackerRequest {
  string order_id = 1;
  string beneficiary = 2;
}

message OrderTrackerResponse {
  string order_tracker = 1;
}

message ReadOrderTrackerByAddressRequest {
  string order_tracker = 1;
}

message ReadOrderTrackerByIdsRequest {
  string beneficiary = 1;
  optional string order_id = 2;
  optional string partner_id = 3;
  optional string request_id = 4;
}

message OrderTrackerData {
  string order_id = 1;
  string partner_id = 2;
  string amount_in = 3;
  string amount_out = 4;
  string beneficiary = 5;
  string pdv = 6;
}

message MetaArg {
  string key = 1;
  string value = 2;
}

message CreateOrderRequest {
  string request_id = 1;
  string partner_id = 2;
  string beneficiary = 3;
  base.Token token = 4;
  string amount = 5;
  optional bool pull = 6;
  repeated MetaArg meta = 7;
}

message ReplenishRequest {
  string request_id = 1;
  string order_tracker = 2;
  base.Token token = 3;
  string amount = 4;
  optional bool do_not_close = 5;
  optional string kamino_amount = 6;
  repeated MetaArg meta = 7;
}

message TransferRequest {
  string request_id = 1;
  string from = 2;
  string to = 3;
  string amount = 4;
  base.Token token = 5;
  optional base.Token to_token = 6;
  optional base.Ed25519Pair ed25519_pair = 7;
  repeated MetaArg meta = 8;
}

message AttestOrderRequest {
  string order_id = 1;
  string origin_chain = 2;
  string target_chain = 3;
  string origin = 4;
  string proxy = 5;
  string target = 6;
  string txn = 7;
  base.Token asset = 8;
  string amount = 9;
  base.Ed25519Pair ed25519_pair = 10;
  optional string proxy_txn = 11;
  optional base.Token proxy_asset = 12;
  repeated MetaArg meta = 13;
}

message TxResponse {
  string request_id = 1;
  string order_tracker = 2;
  string order_id = 3;
  string signature = 4;
  uint32 position = 5;
  map<string, string> meta = 6;
}
