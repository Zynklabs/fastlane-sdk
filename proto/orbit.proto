syntax = "proto3";

package orbit;

import "base.proto";

service Orbit {
  rpc GetVaultPda (GetPdaRequest) returns (PdaResponse);
  rpc GetOrderPda (GetPdaRequest) returns (PdaResponse);

  rpc ReadOrderPda (GetPdaRequest) returns (OrderData);

  rpc Collect (CollectRequest) returns (TxResponse);
  rpc Disburse (DisburseRequest) returns (TxResponse);

  rpc DecodeEvent (base.DecodeEventRequest) returns (base.EventData);

  rpc VerifyLP (LPRequest) returns (LPState);
  rpc WhitelistLP (LPRequest) returns (LPState);
  rpc RevokeLP (LPRequest) returns (LPState);
}

message GetPdaRequest {
  string key = 1;
}

message PdaResponse {
  string pda = 1;
  string key = 2;
  string type = 3;
}

message OrderData {
  string order_id = 1;
  string amount = 2;
  string address = 3;
}

message CollectRequest {
  string order_id = 1;
  string vault_id = 2;
  string user_id = 3;
  string address = 4;
  string amount = 5;
  optional base.Token token = 6;
}

message DisburseRequest {
  string request_id = 1;
  string user_id = 2;
  string address = 3;
  string amount = 4;
  optional string order_id = 5;
  optional base.Token token = 6;
}

message TxResponse {
  string order_id = 1;
  string signature = 2;
  uint32 position = 3;
}

message LPRequest {
  string user_id = 1;
  string address = 2;
  optional string memo = 3;
}

message LPState {
  string status = 1;
  string pda = 2;
  optional string tx_pda = 3;
}